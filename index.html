<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kirim Izin & Simpan Spreadsheet</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background-color: #f4f6f9;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px;
    }
    .card {
      background: #ffffff;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 24px;
      margin: auto 0;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: auto;
      margin: 0 auto 16px auto;
      display: block;
    }
    h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    h2::before {
      content: "";
      display: inline-block;
      width: 4px;
      height: 20px;
      background-color: #25D366;
      border-radius: 2px;
    }
    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 6px;
    }
    .required-star {
      color: #dc2626;
      margin-left: 2px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      color: #1f2937;
      background-color: #f9fafb;
      transition: all 0.2s ease;
      outline: none;
    }
    input[type="text"], input[type="date"], select {
      height: 46px;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234b5563' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 16px center;
      background-size: 16px;
      padding-right: 40px;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #25D366;
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.15);
    }
    .preview-box {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 16px;
      font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      color: #4b5563;
      white-space: pre-wrap;
      line-height: 1.5;
      text-align: left;
    }
    .btn-kirim {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 48px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
      background-color: #25D366;
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
    }
    .btn-kirim:hover {
      background-color: #20ba5a;
    }
    .btn-kirim:active {
      transform: scale(0.98);
    }
    .btn-kirim:disabled {
      background-color: #d1d5db;
      box-shadow: none;
      cursor: not-allowed;
    }
    .status-msg {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
      min-height: 18px;
    }
    .status-msg.loading { color: #2563eb; }
    .status-msg.success { color: #16a34a; }
    .status-msg.error { color: #dc2626; }
    .file-input-wrapper {
      position: relative;
      margin-top: 4px;
    }
    input[type="file"] {
      padding: 8px 12px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="images.png" alt="Logo" class="logo">
    <h2>Permohonan Izin Kerja</h2>
    
    <div class="form-group">
      <label for="nama">Nama<span class="required-star">*</span></label>
      <select id="nama" onchange="onNamaChange()">
        <option value="" disabled selected>Memuat nama guru...</option>
      </select>
    </div>

    <div class="form-group">
      <label for="hari_tgl">Hari/Tanggal<span class="required-star">*</span></label>
      <input type="date" id="hari_tgl" onchange="validateForm()">
    </div>

    <div class="form-group">
      <label for="jenis_izin">Jenis Izin<span class="required-star">*</span></label>
      <select id="jenis_izin" onchange="validateForm()">
        <option value="tidak masuk kerja">Izin Tidak Masuk Kerja</option>
        <option value="datang terlambat">Izin Datang Terlambat</option>
        <option value="pulang lebih awal">Izin Pulang Lebih Awal</option>
      </select>
    </div>

    <div class="form-group">
      <label for="ket">Alasan / Detail Izin<span class="required-star">*</span></label>
      <textarea id="ket" placeholder="Tuliskan alasan izin Anda secara jelas..." oninput="validateForm()"></textarea>
    </div>

    <div class="form-group">
      <label for="bukti_foto">Upload Bukti Foto / Dokumen<span class="required-star">*</span></label>
      <div class="file-input-wrapper">
        <input type="file" id="bukti_foto" accept="image/*,application/pdf" onchange="validateForm()">
      </div>
    </div>

    <div class="form-group">
      <label>Preview Surat Izin</label>
      <div id="previewText" class="preview-box"></div>
    </div>

    <button id="btnKirim" class="btn-kirim" onclick="prosesIzin()" disabled>Simpan & Kirim ke WhatsApp</button>
    <div id="statusMessage" class="status-msg"></div>
  </div>

  <script>
    const fields = ['nama', 'hari_tgl', 'jenis_izin', 'ket'];
    
    // DEFINISI SATU NOMOR TUJUAN WA (KEPALA SEKOLAH)
    const targetPhone = '6282322575527';

    const apiUrl = 'https://script.google.com/macros/s/AKfycbxRutqld0iFXEFQ1UJiZhrXEEa_VY5hl9vLIT3W4GR1rzpajEZEPbuqN172VdEmZ0Q83A/exec';
    
    let dbGuru = [];
    let selectedKedudukan = 'Guru';

    async function loadDaftarNama() {
      const selectNama = document.getElementById('nama');
      try {
        const response = await fetch(apiUrl);
        dbGuru = await response.json();
        
        selectNama.innerHTML = '<option value="" disabled selected>Pilih Nama & Gelar</option>';
        if (Array.isArray(dbGuru) && dbGuru.length > 0) {
          dbGuru.forEach(guru => {
            const opt = document.createElement('option');
            opt.value = guru.nama;
            opt.textContent = guru.nama;
            selectNama.appendChild(opt);
          });
        } else {
          selectNama.innerHTML = '<option value="" disabled selected>Gagal memuat nama (Data Kosong)</option>';
        }
      } catch (error) {
        console.error("Error loading names:", error);
        selectNama.innerHTML = '<option value="" disabled selected>Gagal memuat daftar nama</option>';
      }
      validateForm();
    }

    function onNamaChange() {
      const selectNama = document.getElementById('nama');
      const selectedNama = selectNama.value;
      const found = dbGuru.find(g => g.nama === selectedNama);
      if (found) {
        selectedKedudukan = found.kedudukan;
      }
      updatePreview();
      validateForm();
    }

    function validateForm() {
      const namaValue = document.getElementById('nama').value;
      const rawDate = document.getElementById('hari_tgl').value;
      const alasanValue = document.getElementById('ket').value.trim();
      const fileInput = document.getElementById('bukti_foto');
      const btn = document.getElementById('btnKirim');

      const isComplete = namaValue && rawDate && alasanValue && fileInput.files.length > 0;
      btn.disabled = !isComplete;
    }

    function formatIndonesianDate(dateString) {
      if (!dateString) return '……………………………………………';
      const date = new Date(dateString);
      const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const dayName = days[date.getDay()];
      
      const dd = String(date.getDate()).padStart(2, '0');
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const yy = String(date.getFullYear()).substring(2);
      
      return `${dayName}, ${dd}/${mm}/${yy}`;
    }

    function getIndonesianMonthYear(dateString) {
      if (!dateString) return '…………………… 2025';
      const date = new Date(dateString);
      const months = [
        'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
        'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
      ];
      return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function updatePreview() {
      const nama = document.getElementById('nama').value || '…………………………….';
      const rawDate = document.getElementById('hari_tgl').value;
      const hariTgl = formatIndonesianDate(rawDate);
      const tglSurat = getIndonesianMonthYear(rawDate);
      const jenisIzin = document.getElementById('jenis_izin').value;
      const alasan = document.getElementById('ket').value || '…………………………………………………..';
      
      const template = `SURAT IZIN

Kepada : Yth. Bp. Drs. Guruh Sarang Murtiyoso, S.Pd., M.M.
Kepala SMK Gajah Mungkur 1 Wuryantoro
di Tempat

Dengan hormat,
Saya yang bertanda tangan di bawah ini:
Nama : ${nama}
Kedudukan : ${selectedKedudukan}

Dengan ini mengajukan izin ${jenisIzin} pada:
Hari, tanggal : ${hariTgl}
Alasan : ${alasan}

Sehubungan dengan hal tersebut, saya mohon izin untuk tidak melaksanakan tugas pada hari tersebut. Demikian surat izin ini kami sampaikan, atas perhatian dan pemberian izinnya kami mengucapkan terima kasih.


Wuryantoro, ${tglSurat}
Yang mengajukan izin



${nama}`;
      
      document.getElementById('previewText').innerText = template;
      return template;
    }

    fields.forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        updatePreview();
        validateForm();
      });
    });
    document.getElementById('jenis_izin').addEventListener('change', () => {
      updatePreview();
      validateForm();
    });

    function getFileData(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    async function prosesIzin() {
      const btn = document.getElementById('btnKirim');
      const statusDiv = document.getElementById('statusMessage');
      const namaValue = document.getElementById('nama').value;
      const rawDate = document.getElementById('hari_tgl').value;
      const alasanValue = document.getElementById('ket').value.trim();
      const fileInput = document.getElementById('bukti_foto');

      btn.disabled = true;
      statusDiv.className = "status-msg loading";
      statusDiv.innerText = "Sedang mengunggah & menyimpan data...";

      const formattedDate = formatIndonesianDate(rawDate);
      const payload = {
        nama: namaValue,
        kedudukan: selectedKedudukan,
        jenis_izin: document.getElementById('jenis_izin').value,
        hari_tgl: formattedDate,
        alasan: alasanValue
      };

      const file = fileInput.files[0];
      try {
        const base64Data = await getFileData(file);
        payload.fileData = base64Data;
        payload.fileName = file.name;
        payload.fileType = file.type;
      } catch (err) {
        console.error("Gagal membaca file: ", err);
        statusDiv.className = "status-msg error";
        statusDiv.innerText = "Gagal memproses file.";
        btn.disabled = false;
        return;
      }

      try {
        await fetch(apiUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        statusDiv.className = "status-msg success";
        statusDiv.innerText = "Berhasil disimpan! Mengalihkan ke WhatsApp...";
        
        setTimeout(() => {
          const text = updatePreview();
          const url = `https://wa.me/${targetPhone}?text=${encodeURIComponent(text)}`;
          window.open(url, '_blank');
          btn.disabled = false;
          statusDiv.innerText = "";
          statusDiv.className = "status-msg";
        }, 1500);

      } catch (error) {
        console.error(error);
        statusDiv.className = "status-msg error";
        statusDiv.innerText = "Gagal memproses data. Hubungi admin.";
        btn.disabled = false;
      }
    }

    window.onload = () => {
      loadDaftarNama();
      updatePreview();
    };
  </script>
</body>
</html>
