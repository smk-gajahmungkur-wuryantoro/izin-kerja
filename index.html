<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kirim Izin & Simpan Spreadsheet</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background-color: #f4f6f9;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px;
    }
    .card {
      background: #ffffff;
      width: 100%;
      max-width: 450px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 24px;
      margin: auto 0;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: auto;
      margin: 0 auto 16px auto;
      display: block;
    }
    h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    h2::before {
      content: "";
      display: inline-block;
      width: 4px;
      height: 20px;
      background-color: #25D366;
      border-radius: 2px;
    }
    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      height: 46px;
      padding: 0 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      color: #1f2937;
      background-color: #f9fafb;
      transition: all 0.2s ease;
      outline: none;
    }
    input:focus {
      border-color: #25D366;
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.15);
    }
    .preview-box {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 16px;
      font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 13px;
      color: #4b5563;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .btn-kirim {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 48px;
      background-color: #25D366;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
      transition: all 0.2s ease;
      margin-top: 10px;
    }
    .btn-kirim:hover {
      background-color: #20ba5a;
    }
    .btn-kirim:active {
      transform: scale(0.98);
    }
    .btn-kirim:disabled {
      background-color: #d1d5db;
      box-shadow: none;
      cursor: not-allowed;
    }
    .status-msg {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
      min-height: 18px;
    }
    .status-msg.loading { color: #2563eb; }
    .status-msg.success { color: #16a34a; }
    .status-msg.error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <img src="images.png" alt="Logo" class="logo">
    <h2>Permohonan Izin Kerja</h2>
    
    <div class="form-group">
      <label for="nama">Nama</label>
      <input type="text" id="nama" placeholder="Nama & gelar.">
    </div>

    <div class="form-group">
      <label for="hari_tgl">Hari/Tanggal</label>
      <input type="text" id="hari_tgl" placeholder="Contoh: Senin, 20/7/26">
    </div>

    <div class="form-group">
      <label for="waktu">Waktu</label>
      <input type="text" id="waktu" placeholder="Contoh: jam 11.30 - selesai atau 08.00 - 10.00">
    </div>

    <div class="form-group">
      <label for="ket">Keterangan</label>
      <input type="text" id="ket" placeholder="Contoh: Periksa kesehatan ke R.S. / Keperluan keluarga">
    </div>

    <div class="form-group">
      <label>Preview Pesan WhatsApp</label>
      <div id="previewText" class="preview-box"></div>
    </div>

    <button id="btnKirim" class="btn-kirim" onclick="prosesIzin()">Simpan & Kirim ke WhatsApp</button>
    <div id="statusMessage" class="status-msg"></div>
  </div>

  <script>
    const fields = ['nama', 'hari_tgl', 'waktu', 'ket'];
    const targetPhone = '6282322575527';
    const apiUrl = 'https://script.google.com/macros/s/AKfycbxRutqld0iFXEFQ1UJiZhrXEEa_VY5hl9vLIT3W4GR1rzpajEZEPbuqN172VdEmZ0Q83A/exec';

    function updatePreview() {
      const nama = document.getElementById('nama').value || '(Nama)';
      const hariTgl = document.getElementById('hari_tgl').value || '(Hari/Tanggal)';
      const waktu = document.getElementById('waktu').value || '(Waktu)';
      const ket = document.getElementById('ket').value || '(Keterangan)';
      
      const template = `Assallamu'allaikum warohmatullahi Wabarokatuh.
memohon ijin ,pada : 
Nama= ${nama}
Hari/tgl= ${hariTgl}
Waktu = ${waktu}
Ket. = ${ket}
Demikian informasi disampaikan , mohon maaf .
Atas perhatian serta kerjasama yg baik dan kondusifitas kegiatan pada hari ini, disampaikan terima kasih.
Wasallam warohmatullahi Wabarokaatuh.

Ttd
${nama}`;
      
      document.getElementById('previewText').innerText = template;
      return template;
    }

    fields.forEach(id => {
      document.getElementById(id).addEventListener('input', updatePreview);
    });

    async function prosesIzin() {
      const btn = document.getElementById('btnKirim');
      const statusDiv = document.getElementById('statusMessage');
      const namaValue = document.getElementById('nama').value;

      const payload = {
        nama: namaValue,
        hari_tgl: document.getElementById('hari_tgl').value,
        waktu: document.getElementById('waktu').value,
        ket: document.getElementById('ket').value,
        ttd: namaValue
      };

      btn.disabled = true;
      statusDiv.className = "status-msg loading";
      statusDiv.innerText = "Sedang menyimpan ke Spreadsheet...";

      try {
        await fetch(apiUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        statusDiv.className = "status-msg success";
        statusDiv.innerText = "Berhasil disimpan! Mengalihkan ke WhatsApp...";
        
        setTimeout(() => {
          const text = updatePreview();
          const url = `https://wa.me/${targetPhone}?text=${encodeURIComponent(text)}`;
          window.open(url, '_blank');
          btn.disabled = false;
          statusDiv.innerText = "";
          statusDiv.className = "status-msg";
        }, 1500);

      } catch (error) {
        console.error(error);
        statusDiv.className = "status-msg error";
        statusDiv.innerText = "Gagal memproses data. Hubungi admin.";
        btn.disabled = false;
      }
    }

    // Jalankan preview pertama kali
    updatePreview();
  </script>
</body>
</html>
